<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f7a5a" />
    <title>TeacherFlowAI Mobile Shell</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #fbfcf9, #edf2eb);
        color: #1a261d;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        width: min(420px, 100%);
        padding: 24px;
        border: 1px solid #d7ded5;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 18px 38px rgba(26, 38, 29, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.6rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #58665b;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1>TeacherFlowAI</h1>
      <p>This mobile shell loads the deployed TeacherFlowAI app. Set the Capacitor server URL to your live backend before building iPhone and Android apps.</p>
    </main>
  </body>
</html>
